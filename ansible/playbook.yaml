- name: Car Hacking Wiki
  hosts: hosts
  tasks:
    - name: Install apt packages
      ansible.builtin.apt:
        name:
          - nginx
          - mariadb-server
          - python3-mysqldb
        state: present

    - name: Install snap packages
      community.general.snap:
        name: certbot
        state: present
        classic: true

    - name: Add Docker GPG apt Key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker Repository
      ansible.builtin.apt_repository:
        repo: deb https://download.docker.com/linux/ubuntu noble stable
        state: present

    - name: Update apt and install docker-ce
      ansible.builtin.apt:
        name: docker-ce
        state: present
        update_cache: true

    - name: Obtain certificates
      ansible.builtin.command:
        cmd: certbot certonly --nginx --keep-until-expiring -d "{{ item }}"
      register: certbot_output
      changed_when: "'Successfully received certificate' in certbot_output.stdout"
      loop:
        - carhackingwiki.com
        - nissanleaf.carhackingwiki.com

    - name: Automatically renew certificates
      ansible.builtin.cron:
        name: "renew certificates"
        minute: "0"
        hour: "0"
        job: 'certbot renew --renew-hook "systemctl reload nginx"'
        state: present

    - name: Install nginx configuration
      ansible.builtin.copy:
        src: ../nginx.conf
        dest: /etc/nginx/sites-available/default
        mode: "0644"
      notify:
        - Restart nginx

    - name: Create directory structure
      ansible.builtin.file:
        path: /root/wiki/images
        state: directory
        mode: "0755"

    - name: Copy LocalSettings.php
      ansible.builtin.copy:
        src: ../LocalSettings.php
        dest: /root/wiki/LocalSettings.php
        mode: "0644"

    - name: Copy compose.yaml
      ansible.builtin.copy:
        src: ../compose.yaml
        dest: /root/wiki/compose.yaml
        mode: "0644"

    - name: Configure mysql bind address
      ansible.builtin.lineinfile:
        path: /etc/mysql/mariadb.conf.d/50-server.cnf
        regexp: "^bind-address"
        line: "bind-address		= 0.0.0.0"
      notify:
        - Restart mysql

    - name: Create wikiuser
      community.mysql.mysql_user:
        login_unix_socket: /var/run/mysqld/mysqld.sock
        name: wikiuser
        host: "%"
        password: DA38Whg0EbbHjM
        priv: "my_wiki.*:ALL"
        state: present

    - name: Create database
      community.mysql.mysql_db:
        login_unix_socket: /var/run/mysqld/mysqld.sock
        name: my_wiki
        state: present

    - name: Create and start MediaWiki container
      community.docker.docker_compose_v2:
        project_src: wiki

  handlers:
    - name: Restart nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted

    - name: Restart mysql
      ansible.builtin.systemd:
        name: mysql
        state: restarted
