# Limit requests per second per IP to prevent overloading
limit_req_zone $binary_remote_addr zone=wiki_rl:10m rate=2r/s;
limit_req_status 429;

# Record request processing time in the logs for performance monitoring
log_format timed '$remote_addr - $remote_user [$time_local] '
                 '"$request" $status $body_bytes_sent '
                 '"$http_referer" "$http_user_agent" '
                 'rt=$request_time ';
access_log /var/log/nginx/access.log timed;

# Get the client's IP address from Cloudflare
real_ip_header CF-Connecting-IP;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

# Redirect everything to https
server {
	listen 80 default_server;
	listen [::]:80 default_server;

	server_name _;

	return 301 https://$host$request_uri;
}

# Return 404 with default certificate for unknown hostname
server {
	listen 443 ssl;
	server_name _;
	ssl_certificate /etc/letsencrypt/live/carhackingwiki.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/carhackingwiki.com/privkey.pem;
	include /etc/letsencrypt/options-ssl-nginx.conf;
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
	return       404;
}

# Proxy root domain to MediaWiki
server {
	listen 443 ssl;
	server_name carhackingwiki.com;

	ssl_certificate /etc/letsencrypt/live/carhackingwiki.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/carhackingwiki.com/privkey.pem;
	include /etc/letsencrypt/options-ssl-nginx.conf;
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

	location / {
		limit_req zone=wiki_rl burst=10;

		proxy_set_header	Host $http_host;
		proxy_set_header	X-Real-Ip $remote_addr;
		proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header	X-Forwarded-Proto $scheme;

		proxy_pass		    http://localhost:8080;
		proxy_redirect		off;
	}
}

# Proxy subdomains to MediaWiki (in the future, wildcard domain with wildcard cert)
server {
	listen 443 ssl;
	server_name nissanleaf.carhackingwiki.com;

	ssl_certificate /etc/letsencrypt/live/nissanleaf.carhackingwiki.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/nissanleaf.carhackingwiki.com/privkey.pem;
	include /etc/letsencrypt/options-ssl-nginx.conf;
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

	client_max_body_size 10M;

	location / {
		limit_req zone=wiki_rl burst=10;

		proxy_set_header	Host $http_host;
		proxy_set_header	X-Real-Ip $remote_addr;
		proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header	X-Forwarded-Proto $scheme;

		proxy_pass		    http://localhost:8080;
		proxy_redirect		off;
	}
}