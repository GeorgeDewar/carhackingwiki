# Redirect everything to https
server {
	listen 80 default_server;
	listen [::]:80 default_server;

	server_name _;

	return 301 https://$host$request_uri;	
}

# Return 404 with default certificate for unknown hostname
server {
	listen 443 ssl;
	server_name _;
	ssl_certificate /etc/letsencrypt/live/carhackingwiki.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/carhackingwiki.com/privkey.pem;
	include /etc/letsencrypt/options-ssl-nginx.conf;
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
	return       404;
}

# Proxy root domain to MediaWiki
server {
	listen 443 ssl;
	server_name carhackingwiki.com;

	ssl_certificate /etc/letsencrypt/live/carhackingwiki.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/carhackingwiki.com/privkey.pem;
	include /etc/letsencrypt/options-ssl-nginx.conf;
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

	location / {
		proxy_set_header	Host $http_host;
		proxy_set_header	X-Real-Ip $remote_addr;
		proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header	X-Forwarded-Proto $scheme;

		proxy_pass		    http://localhost:13443;
		proxy_redirect		off;
	}
}

# Proxy subdomains to MediaWiki (in the future, wildcard domain with wildcard cert)
server {
	listen 443 ssl;
	server_name nissanleaf.carhackingwiki.com;

	ssl_certificate /etc/letsencrypt/live/nissanleaf.carhackingwiki.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/nissanleaf.carhackingwiki.com/privkey.pem;
	include /etc/letsencrypt/options-ssl-nginx.conf;
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

	location / {
		proxy_set_header	Host $http_host;
		proxy_set_header	X-Real-Ip $remote_addr;
		proxy_set_header	X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header	X-Forwarded-Proto $scheme;

		proxy_pass		    http://localhost:13443;
		proxy_redirect		off;
	}
}